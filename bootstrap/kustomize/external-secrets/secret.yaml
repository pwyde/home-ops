---
apiVersion: v1
kind: Secret
metadata:
  name: onepassword-connect-credentials-secret
  namespace: external-secrets
stringData:
  1password-credentials.json: 'op://Kubernetes/1password/OP_CREDENTIALS_JSON' # Must be quoted.
---
apiVersion: v1
kind: Secret
metadata:
  name: onepassword-connect-vault-secret
  namespace: external-secrets
stringData:
  token: op://Kubernetes/1password/OP_CONNECT_TOKEN
