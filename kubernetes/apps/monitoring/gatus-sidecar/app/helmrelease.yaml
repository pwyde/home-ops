---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus-sidecar
spec:
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
  interval: 1h
  values:
    config:
      existingConfigMap: "{{ .Release.Name }}-configmap"
      items:
        - key: config.yaml
          path: config.yaml
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    gatus:
      delayStartSeconds: "5"
      env:
        TZ: Europe/Stockholm
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
      hostnames:
        - "{{ .Release.Name }}.wyde.network"
        - status.wyde.network
      parentRefs:
        - name: envoy-internal
          namespace: networking
    monitoring:
      serviceMonitor:
        enabled: true
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
    strategy:
      type: RollingUpdate
    sidecar:
      kinds:
        httproute:
          enable: true
          auto: true
        service:
          enable: true
