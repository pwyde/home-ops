---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zfs-scrubber
spec:
  chartRef:
    kind: OCIRepository
    name: zfs-scrubber
  interval: 1h
  values:
    controllers:
      zfs-scrubber:
        type: cronjob
        cronjob:
          backoffLimit: 0
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          schedule: "0 3 * * 0" # Every Sunday at 03:00.
          successfulJobsHistory: 1
          timeZone: Europe/Stockholm
        containers:
          app:
            image:
              repository: ghcr.io/heavybullets8/zfs-scrubber
              tag: 1.1.2@sha256:d142396cbf0926b84a586666b777e357c622c7780bcf1444af4384bf3f14411b
            env:
              ACTION: "scrub"
              ZFS_POOL: "zfspv-pool"
              PUSHOVER_NOTIFICATION: false
              TALOS_VERSION: ${TALOS_VERSION}
            envFrom:
              - secretRef:
                  name: zfs-scrubber-secret
            securityContext:
              privileged: true
    persistence:
      dev:
        type: hostPath
        hostPath: /dev/zfs
        globalMounts:
          - path: /dev/zfs
