---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: openebs-zfs
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
allowVolumeExpansion: true
parameters:
  compression: "zstd"
  dedup: "off"
  fstype: "zfs"
  poolname: "zfspv-pool"
  recordsize: "128k"
  shared: "yes"
provisioner: zfs.csi.openebs.io
