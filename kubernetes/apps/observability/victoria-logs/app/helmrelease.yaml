---
# yaml-language-server: $schema=https://home-kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  values:
    dashboards:
      enabled: true
      annotations:
        grafana_folder: System
      labels:
        grafana_dashboard: "1"
    server:
      fullnameOverride: *app
      image:
        registry: quay.io
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 20Gi
      retentionPeriod: 14d
      route:
        enabled: true
        hostnames:
          - victoria-logs.wyde.network
        parentRefs:
          - name: envoy-internal
            namespace: network
      serviceMonitor:
        enabled: true
